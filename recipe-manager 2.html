<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recipe Manager · Paige's Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --pink: #f472b6;
    --pink-light: #fce7f3;
    --pink-mid: #fbcfe8;
    --pink-dark: #be185d;
    --black: #0a0a0a;
    --off-white: #fdf8f9;
    --gray: #71717a;
    --green: #10b981;
    --red: #ef4444;
    --card-radius: 20px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--black); font-size: 15px; line-height: 1.6; }
  h1,h2,h3,h4 { font-family: 'Playfair Display', serif; line-height: 1.2; }
  a { text-decoration: none; color: inherit; }

  .header { background: var(--black); color: #fff; padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-icon { width: 42px; height: 42px; background: var(--pink); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header h1 { font-size: 22px; color: #fff; margin-bottom: 2px; }
  .header-sub { font-size: 12px; color: #a1a1aa; font-weight: 300; }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn { border: none; border-radius: 99px; padding: 10px 22px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.2s, transform 0.2s; display: inline-flex; align-items: center; gap: 7px; }
  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-pink { background: var(--pink); color: #fff; }
  .btn-dark { background: var(--black); color: #fff; }
  .btn-white { background: #fff; color: var(--black); }
  .btn-outline { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.3); }
  .btn-outline:hover { background: rgba(255,255,255,0.1); }
  .btn-sm { padding: 7px 14px; font-size: 12px; }
  .btn-danger { background: #fee2e2; color: var(--red); }

  .main { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 78px); }

  .sidebar { background: #fff; border-right: 1px solid var(--pink-mid); overflow-y: auto; }
  .sidebar-header { padding: 20px; border-bottom: 1px solid var(--pink-mid); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-title { font-size: 13px; font-weight: 500; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; }
  .sidebar-count { background: var(--pink-light); color: var(--pink-dark); font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
  .recipe-list { padding: 8px; }
  .recipe-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 14px; cursor: pointer; transition: background 0.15s; margin-bottom: 2px; }
  .recipe-item:hover { background: var(--pink-light); }
  .recipe-item.active { background: var(--black); color: #fff; }
  .recipe-item-emoji { font-size: 20px; flex-shrink: 0; }
  .recipe-item-info { flex: 1; min-width: 0; }
  .recipe-item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recipe-item.active .recipe-item-title { color: #fff; }
  .recipe-item-cat { font-size: 11px; color: var(--gray); font-weight: 300; }
  .recipe-item.active .recipe-item-cat { color: #a1a1aa; }

  .empty-sidebar { text-align: center; padding: 48px 24px; color: var(--gray); }
  .empty-sidebar p { font-size: 13px; font-weight: 300; line-height: 1.6; }

  .editor { padding: 32px; overflow-y: auto; }
  .editor-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 400px; gap: 14px; text-align: center; color: var(--gray); }
  .placeholder-icon { font-size: 52px; margin-bottom: 8px; }
  .editor-placeholder h3 { font-size: 22px; color: var(--black); }
  .editor-placeholder p { font-size: 14px; font-weight: 300; max-width: 320px; line-height: 1.7; }

  .form-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
  .form-header h2 { font-size: 26px; }
  .form-header-actions { display: flex; gap: 8px; }

  .form-section { background: #fff; border: 1px solid var(--pink-mid); border-radius: var(--card-radius); padding: 24px; margin-bottom: 20px; }
  .form-section-title { font-size: 14px; font-weight: 500; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 18px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .form-row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-group:last-child { margin-bottom: 0; }
  label { font-size: 12px; font-weight: 500; color: var(--gray); text-transform: uppercase; letter-spacing: 0.06em; }
  input[type=text], input[type=number], input[type=url], select, textarea {
    background: var(--off-white); border: 1.5px solid var(--pink-mid); border-radius: 12px;
    padding: 10px 14px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 300;
    color: var(--black); outline: none; transition: border-color 0.2s; width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--pink); background: #fff; }
  textarea { resize: vertical; min-height: 80px; }
  select { cursor: pointer; }

  .list-editor { display: flex; flex-direction: column; gap: 8px; }
  .list-item-row { display: flex; gap: 8px; align-items: center; }
  .list-item-row input { flex: 1; }
  .remove-btn { background: #fee2e2; border: none; color: var(--red); border-radius: 8px; width: 32px; height: 32px; font-size: 16px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .remove-btn:hover { background: #fecaca; }
  .add-row-btn { background: var(--pink-light); border: 1.5px dashed var(--pink-mid); color: var(--pink-dark); border-radius: 12px; padding: 9px 16px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.2s; text-align: left; }
  .add-row-btn:hover { background: var(--pink-mid); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--black); color: #fff; padding: 12px 20px; border-radius: 14px; font-size: 13px; font-weight: 500; z-index: 300; transform: translateY(80px); opacity: 0; transition: all 0.3s; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: #065f46; }
  .toast.error { background: #7f1d1d; }

  .delete-confirm { background: #fee2e2; border: 1.5px solid #fecaca; border-radius: 16px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .delete-confirm p { font-size: 14px; color: #991b1b; font-weight: 400; }
  .delete-confirm-btns { display: flex; gap: 8px; flex-shrink: 0; }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--pink-mid); max-height: 240px; }
    .form-row, .form-row-3, .form-row-4 { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .form-row, .form-row-3, .form-row-4 { grid-template-columns: 1fr; }
    .editor { padding: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">👩‍🍳</div>
    <div>
      <h1>Recipe Manager</h1>
      <div class="header-sub">Paige's Kitchen · Squirrel Girl Curls</div>
    </div>
  </div>
  <div class="header-actions">
    <a href="cookbook.html" target="_blank" class="btn btn-outline btn-sm">Preview cookbook →</a>
    <button class="btn btn-pink" onclick="newRecipe()">+ Add recipe</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Recipes</span>
      <span class="sidebar-count" id="recipeCount">0</span>
    </div>
    <div class="recipe-list" id="recipeList"></div>
  </div>

  <div class="editor" id="editor">
    <div class="editor-placeholder" id="placeholder">
      <div class="placeholder-icon">🍽️</div>
      <h3>Welcome, Paige!</h3>
      <p>Click "+ Add recipe" to start building your cookbook, or select an existing recipe to edit it.</p>
      <button class="btn btn-pink" onclick="newRecipe()" style="margin-top:8px;">+ Add your first recipe</button>
    </div>
    <div id="formArea" style="display:none;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'sgc_recipes';
const CATEGORIES = ['Breakfast', 'Lunch', 'Dinner', 'Snacks & Treats'];
const EMOJI_MAP = { 'Breakfast': '🍳', 'Lunch': '🥗', 'Dinner': '🍽️', 'Snacks & Treats': '🍫' };

let recipes = [];
let currentId = null;
let nextId = 1;
let deleteConfirming = false;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      recipes = JSON.parse(raw);
      nextId = Math.max(...recipes.map(r => r.id), 0) + 1;
    } else {
      recipes = getStarters();
      nextId = recipes.length + 1;
      save();
    }
  } catch { recipes = []; }
  renderSidebar();
}

function getStarters() {
  return [
    { id: 1, title: 'Protein Pancakes', category: 'Breakfast', description: 'Fluffy, high-protein pancakes that taste indulgent but fit your macros.', prepTime: '5 min', cookTime: '10 min', servings: 2, calories: 320, protein: 28, carbs: 30, fat: 8, ingredients: ['1 cup oats', '2 eggs', '1 scoop vanilla protein powder', '1/2 cup cottage cheese', '1 tsp baking powder', '1 tsp vanilla extract', 'Pinch of cinnamon'], steps: ['Blend all ingredients until smooth.', 'Heat a non-stick pan over medium heat.', 'Pour 1/4 cup batter per pancake, cook until bubbles form, flip.', 'Cook another 1-2 minutes until golden.'] },
    { id: 2, title: 'Greek Chicken Bowl', category: 'Lunch', description: 'A fresh, filling bowl packed with lean protein and Mediterranean flavors.', prepTime: '10 min', cookTime: '15 min', servings: 1, calories: 480, protein: 45, carbs: 38, fat: 12, ingredients: ['150g chicken breast', '1/2 cup cooked rice', '1/4 cucumber, diced', '1/4 cup cherry tomatoes', '2 tbsp hummus', '30g feta cheese', 'Lemon juice, olive oil, oregano'], steps: ['Season chicken with oregano, salt, pepper. Cook 6-7 min per side.', 'Slice chicken and arrange over rice.', 'Add cucumber, tomatoes, and feta.', 'Top with hummus and lemon.'] },
    { id: 3, title: 'Chocolate Protein Balls', category: 'Snacks & Treats', description: 'No-bake, fudgy protein balls that satisfy cravings without blowing your macros.', prepTime: '10 min', cookTime: '0 min', servings: 12, calories: 95, protein: 6, carbs: 9, fat: 4, ingredients: ['1 cup oats', '2 scoops chocolate protein powder', '3 tbsp peanut butter', '3 tbsp honey', '2 tbsp cocoa powder', '2-3 tbsp almond milk'], steps: ['Mix oats, protein powder, and cocoa powder.', 'Add peanut butter and honey, mix well.', 'Add almond milk 1 tbsp at a time until dough holds together.', 'Roll into 12 balls. Refrigerate 30 min.'] },
  ];
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes));
}

function renderSidebar() {
  const list = document.getElementById('recipeList');
  document.getElementById('recipeCount').textContent = recipes.length;
  if (!recipes.length) {
    list.innerHTML = '<div class="empty-sidebar"><p>No recipes yet.<br>Click "+ Add recipe" to start.</p></div>';
    return;
  }
  list.innerHTML = recipes.map(r => `
    <div class="recipe-item ${currentId === r.id ? 'active' : ''}" onclick="selectRecipe(${r.id})">
      <div class="recipe-item-emoji">${EMOJI_MAP[r.category] || '🍽️'}</div>
      <div class="recipe-item-info">
        <div class="recipe-item-title">${r.title}</div>
        <div class="recipe-item-cat">${r.category}</div>
      </div>
    </div>
  `).join('');
}

function selectRecipe(id) {
  currentId = id;
  deleteConfirming = false;
  const r = recipes.find(x => x.id === id);
  renderSidebar();
  showForm(r);
}

function newRecipe() {
  currentId = null;
  deleteConfirming = false;
  renderSidebar();
  showForm({ title: '', category: 'Breakfast', description: '', prepTime: '', cookTime: '', servings: '', calories: '', protein: '', carbs: '', fat: '', ingredients: [''], steps: [''] });
}

function showForm(r) {
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('formArea').style.display = 'block';

  const isNew = !r.id;

  document.getElementById('formArea').innerHTML = `
    <div class="form-header">
      <h2>${isNew ? 'New Recipe' : 'Edit Recipe'}</h2>
      <div class="form-header-actions">
        ${!isNew ? `<button class="btn btn-sm btn-danger" onclick="confirmDelete()">Delete</button>` : ''}
        <button class="btn btn-sm btn-white" onclick="cancelEdit()" style="border:1.5px solid var(--pink-mid)">Cancel</button>
        <button class="btn btn-sm btn-pink" onclick="saveRecipe()">Save recipe</button>
      </div>
    </div>

    <div id="deleteConfirmArea"></div>

    <div class="form-section">
      <div class="form-section-title">Basic info</div>
      <div class="form-group">
        <label>Recipe name *</label>
        <input type="text" id="f_title" value="${esc(r.title)}" placeholder="e.g. High-Protein Overnight Oats" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category *</label>
          <select id="f_category">
            ${CATEGORIES.map(c => `<option value="${c}" ${r.category === c ? 'selected' : ''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Servings</label>
          <input type="number" id="f_servings" value="${r.servings || ''}" placeholder="e.g. 4" min="1" />
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="f_description" placeholder="A short description of the recipe...">${esc(r.description)}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Prep time</label>
          <input type="text" id="f_prepTime" value="${esc(r.prepTime)}" placeholder="e.g. 10 min" />
        </div>
        <div class="form-group">
          <label>Cook time</label>
          <input type="text" id="f_cookTime" value="${esc(r.cookTime)}" placeholder="e.g. 25 min" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Macros per serving</div>
      <div class="form-row-4">
        <div class="form-group">
          <label>Calories</label>
          <input type="number" id="f_calories" value="${r.calories || ''}" placeholder="320" min="0" />
        </div>
        <div class="form-group">
          <label>Protein (g)</label>
          <input type="number" id="f_protein" value="${r.protein || ''}" placeholder="28" min="0" />
        </div>
        <div class="form-group">
          <label>Carbs (g)</label>
          <input type="number" id="f_carbs" value="${r.carbs || ''}" placeholder="30" min="0" />
        </div>
        <div class="form-group">
          <label>Fat (g)</label>
          <input type="number" id="f_fat" value="${r.fat || ''}" placeholder="8" min="0" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Ingredients</div>
      <div class="list-editor" id="ingredientsList">
        ${(r.ingredients?.length ? r.ingredients : ['']).map((ing, i) => ingredientRow(ing, i)).join('')}
      </div>
      <button class="add-row-btn" onclick="addIngredient()" style="margin-top:10px">+ Add ingredient</button>
    </div>

    <div class="form-section">
      <div class="form-section-title">Instructions</div>
      <div class="list-editor" id="stepsList">
        ${(r.steps?.length ? r.steps : ['']).map((s, i) => stepRow(s, i)).join('')}
      </div>
      <button class="add-row-btn" onclick="addStep()" style="margin-top:10px">+ Add step</button>
    </div>
  `;
}

function ingredientRow(val, i) {
  return `<div class="list-item-row" id="ing_${i}"><input type="text" value="${esc(val)}" placeholder="e.g. 1 cup oats" /><button class="remove-btn" onclick="removeItem('ingredientsList', 'ing_${i}')">×</button></div>`;
}

function stepRow(val, i) {
  return `<div class="list-item-row" id="step_${i}"><textarea style="min-height:60px;resize:vertical" placeholder="Describe this step...">${esc(val)}</textarea><button class="remove-btn" onclick="removeItem('stepsList', 'step_${i}')">×</button></div>`;
}

let ingCount = 10;
let stepCount = 10;

function addIngredient() {
  const list = document.getElementById('ingredientsList');
  const div = document.createElement('div');
  div.innerHTML = ingredientRow('', ingCount);
  list.appendChild(div.firstChild);
  ingCount++;
}

function addStep() {
  const list = document.getElementById('stepsList');
  const div = document.createElement('div');
  div.innerHTML = stepRow('', stepCount);
  list.appendChild(div.firstChild);
  stepCount++;
}

function removeItem(listId, rowId) {
  const list = document.getElementById(listId);
  const row = document.getElementById(rowId);
  if (list.children.length > 1 && row) row.remove();
}

function getListValues(listId) {
  return Array.from(document.getElementById(listId).querySelectorAll('input[type=text], textarea'))
    .map(el => el.value.trim()).filter(Boolean);
}

function saveRecipe() {
  const title = document.getElementById('f_title').value.trim();
  if (!title) { showToast('Please enter a recipe name', 'error'); return; }

  const recipe = {
    id: currentId || nextId++,
    title,
    category: document.getElementById('f_category').value,
    description: document.getElementById('f_description').value.trim(),
    prepTime: document.getElementById('f_prepTime').value.trim(),
    cookTime: document.getElementById('f_cookTime').value.trim(),
    servings: parseInt(document.getElementById('f_servings').value) || null,
    calories: parseInt(document.getElementById('f_calories').value) || null,
    protein: parseInt(document.getElementById('f_protein').value) || null,
    carbs: parseInt(document.getElementById('f_carbs').value) || null,
    fat: parseInt(document.getElementById('f_fat').value) || null,
    ingredients: getListValues('ingredientsList'),
    steps: getListValues('stepsList'),
  };

  if (currentId) {
    const idx = recipes.findIndex(r => r.id === currentId);
    recipes[idx] = recipe;
  } else {
    recipes.push(recipe);
    currentId = recipe.id;
  }

  save();
  renderSidebar();
  showToast('Recipe saved!', 'success');
}

function confirmDelete() {
  document.getElementById('deleteConfirmArea').innerHTML = `
    <div class="delete-confirm">
      <p>Are you sure you want to delete this recipe? This cannot be undone.</p>
      <div class="delete-confirm-btns">
        <button class="btn btn-sm btn-white" onclick="cancelDeleteConfirm()" style="border:1px solid #ccc;color:#333">Cancel</button>
        <button class="btn btn-sm" style="background:var(--red);color:#fff" onclick="deleteRecipe()">Yes, delete</button>
      </div>
    </div>`;
}

function cancelDeleteConfirm() {
  document.getElementById('deleteConfirmArea').innerHTML = '';
}

function deleteRecipe() {
  recipes = recipes.filter(r => r.id !== currentId);
  save();
  currentId = null;
  renderSidebar();
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('formArea').style.display = 'none';
  showToast('Recipe deleted');
}

function cancelEdit() {
  currentId = null;
  renderSidebar();
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('formArea').style.display = 'none';
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 2800);
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

load();
</script>
</body>
</html>
